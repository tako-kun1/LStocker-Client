name: Android APK Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not set."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Create key.properties
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_STORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Android signing secrets are not fully configured."
            exit 1
          fi
          printf '%s\n' \
            'storeFile=release.keystore' \
            "storePassword=$ANDROID_STORE_PASSWORD" \
            "keyAlias=$ANDROID_KEY_ALIAS" \
            "keyPassword=$ANDROID_KEY_PASSWORD" > android/key.properties

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK
        id: apk
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d'+' -f1)
          if [ -z "$VERSION" ]; then
            echo "Could not read version from pubspec.yaml"
            exit 1
          fi
          FINAL_NAME="LStocker-ver-${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/${FINAL_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${FINAL_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: build/app/outputs/flutter-apk/${{ steps.apk.outputs.name }}

      - name: Create release tag
        id: tag
        run: echo "value=apk-${{ github.run_number }}-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload APK
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.value }}
          name: LStocker v${{ steps.apk.outputs.version }}
          body: |
            Automated APK release from commit ${{ github.sha }}
            APK: ${{ steps.apk.outputs.name }}
          artifacts: build/app/outputs/flutter-apk/${{ steps.apk.outputs.name }}
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
